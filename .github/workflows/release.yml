name: Release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('custom_components/$(ls custom_components)/manifest.json'))['version'])")
          if [ "$VERSION" != "$MANIFEST_VERSION" ]; then
            echo "Version mismatch: tag=$VERSION manifest=$MANIFEST_VERSION"
            exit 1
          fi
